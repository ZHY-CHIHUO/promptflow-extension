<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 380px;
            height: 520px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 14px;
            color: #1f2937;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 顶部标题栏 */
        .header {
            padding: 14px 16px 10px;
            border-bottom: 1px solid #e5e7eb;
            flex-shrink: 0;
        }

        .header h2 {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .count {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 2px;
        }

        /* 内容区 */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
        }

        /* Tab 页面 */
        .tab-page {
            display: none;
        }

        .tab-page.active {
            display: block;
        }

        /* 底部 Tab 栏 */
        .tab-bar {
            display: flex;
            border-top: 1px solid #e5e7eb;
            flex-shrink: 0;
        }

        .tab-item {
            flex: 1;
            text-align: center;
            padding: 10px 0 8px;
            cursor: pointer;
            font-size: 11px;
            color: #9ca3af;
            transition: color 0.15s;
            user-select: none;
        }

        .tab-item .icon {
            font-size: 18px;
            display: block;
            margin-bottom: 2px;
        }

        .tab-item.active {
            color: #667eea;
            font-weight: 600;
        }

        /* 列表项 */
        .prompt-item {
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid #f3f4f6;
            cursor: pointer;
            transition: background 0.1s;
        }

        .prompt-item:hover {
            background: #f9fafb;
        }

        .prompt-item .title {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .prompt-item .meta {
            font-size: 11px;
            color: #9ca3af;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }

        .empty-state .icon {
            font-size: 40px;
            margin-bottom: 12px;
        }
    </style>
</head>

<body>

    <!-- 顶部标题 -->
    <div class="header">
        <h2>PromptFlow</h2>
        <div class="count" id="promptCount">共 0 条 Prompt</div>
    </div>

    <!-- 内容区 -->
    <div class="content">
        <!-- Tab 1: 列表 -->
        <div class="tab-page active" id="tab-list">
            <div id="promptList"></div>
        </div>
        <!-- Tab 2: 模板 -->
        <div class="tab-page" id="tab-template">
            <div class="empty-state">
                <div class="icon">📝</div>
                <div>模板功能开发中...</div>
            </div>
        </div>
        <!-- Tab 3: 测试 -->
        <div class="tab-page" id="tab-test">
            <div class="empty-state">
                <div class="icon">🧪</div>
                <div>A/B 测试功能开发中...</div>
            </div>
        </div>
        <!-- Tab 4: 设置 -->
        <div class="tab-page" id="tab-settings">
            <div class="empty-state">
                <div class="icon">⚙️</div>
                <div>设置功能开发中...</div>
            </div>
        </div>
    </div>

    <!-- 底部 Tab 栏 -->
    <div class="tab-bar">
        <div class="tab-item active" data-tab="tab-list">
            <span class="icon">📋</span>列表
        </div>
        <div class="tab-item" data-tab="tab-template">
            <span class="icon">📝</span>模板
        </div>
        <div class="tab-item" data-tab="tab-test">
            <span class="icon">🧪</span>测试
        </div>
        <div class="tab-item" data-tab="tab-settings">
            <span class="icon">⚙️</span>设置
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
