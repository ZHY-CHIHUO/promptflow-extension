<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PromptFlow</title>
    <style>
      /* ===== 设计系统变量 ===== */
      :root {
        /* 品牌色 */
        --pf-primary: #7c3aed;
        --pf-primary-light: #8b5cf6;
        --pf-primary-dark: #6d28d9;
        --pf-primary-bg: #f5f3ff;
        /* 中性色 */
        --pf-bg: #ffffff;
        --pf-bg-secondary: #fafafb;
        --pf-bg-tertiary: #f0f0f5;
        --pf-border: #e8e8ee;
        --pf-border-light: #f0f0f2;
        /* 文字色 */
        --pf-text-primary: #1a1a2e;
        --pf-text-secondary: #6b6b80;
        --pf-text-tertiary: #9b9bb0;
        --pf-text-placeholder: #b8b8cc;
        /* 功能色 */
        --pf-success: #059669;
        --pf-success-bg: #ecfdf5;
        --pf-danger: #e53e3e;
        --pf-danger-bg: #fef2f2;
        /* 字号 */
        --pf-fs-xs: 11px;
        --pf-fs-sm: 12px;
        --pf-fs-base: 13px;
        --pf-fs-md: 14px;
        --pf-fs-lg: 15px;
        /* 间距 */
        --pf-space-xs: 4px;
        --pf-space-sm: 8px;
        --pf-space-base: 12px;
        --pf-space-md: 14px;
        --pf-space-lg: 16px;
        --pf-space-xl: 20px;
        /* 圆角 */
        --pf-radius-sm: 6px;
        --pf-radius-base: 8px;
        --pf-radius-md: 10px;
        --pf-radius-lg: 12px;
        --pf-radius-xl: 16px;
        /* 阴影 */
        --pf-shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
        --pf-shadow-base: 0 2px 8px rgba(0, 0, 0, 0.08);
        --pf-shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --pf-shadow-button: 0 2px 8px rgba(124, 58, 237, 0.3);
        /* 过渡 */
        --pf-transition: 0.15s ease;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 360px;
        height: 460px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
        font-size: var(--pf-fs-base);
        color: var(--pf-text-primary);
        background: var(--pf-bg);
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      /* ===== 头部 ===== */
      .header {
        padding: var(--pf-space-base) var(--pf-space-md) 0;
        display: flex;
        align-items: center;
        gap: var(--pf-space-sm);
        border-bottom: 1px solid var(--pf-border-light);
        flex-shrink: 0;
      }
      .header .logo {
        font-size: var(--pf-fs-lg);
        font-weight: 700;
        color: var(--pf-primary);
        letter-spacing: -0.01em;
      }
      .header .badge {
        font-size: var(--pf-fs-xs);
        background: var(--pf-primary);
        color: #fff;
        padding: 2px 6px;
        border-radius: var(--pf-radius-sm);
        font-weight: 600;
      }
      /* ===== Tab 栏 ===== */
      .tabs {
        display: flex;
        gap: 0;
        padding: 0 var(--pf-space-md);
        flex-shrink: 0;
        border-bottom: 1px solid var(--pf-border-light);
      }
      .tab-item {
        padding: 10px var(--pf-space-md);
        cursor: pointer;
        color: var(--pf-text-tertiary);
        font-size: var(--pf-fs-base);
        border-bottom: 2px solid transparent;
        transition:
          color var(--pf-transition),
          border-color var(--pf-transition);
        user-select: none;
      }
      .tab-item:hover {
        color: var(--pf-text-secondary);
      }
      .tab-item.active {
        color: var(--pf-primary);
        border-bottom-color: var(--pf-primary);
        font-weight: 600;
      }
      /* ===== 搜索栏 ===== */
      .search-bar {
        display: flex;
        align-items: center;
        gap: var(--pf-space-sm);
        padding: var(--pf-space-sm) var(--pf-space-md);
        flex-shrink: 0;
      }
      .search-bar input {
        flex: 1;
        padding: 7px 10px;
        border: 1px solid var(--pf-border);
        border-radius: var(--pf-radius-base);
        background: var(--pf-bg-secondary);
        color: var(--pf-text-primary);
        font-size: var(--pf-fs-base);
        outline: none;
        transition:
          border-color var(--pf-transition),
          box-shadow var(--pf-transition),
          background var(--pf-transition);
      }
      .search-bar input:focus {
        border-color: var(--pf-primary);
        box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        background: var(--pf-bg);
      }
      .search-bar input::placeholder {
        color: var(--pf-text-placeholder);
      }
      .search-bar .btn-sm {
        padding: 6px 10px;
        border: none;
        border-radius: var(--pf-radius-base);
        background: var(--pf-bg-tertiary);
        color: var(--pf-text-secondary);
        cursor: pointer;
        font-size: var(--pf-fs-sm);
        white-space: nowrap;
        transition:
          background var(--pf-transition),
          transform var(--pf-transition);
      }
      .search-bar .btn-sm:hover {
        background: #e5e5ee;
      }
      .search-bar .btn-sm:active {
        transform: scale(0.96);
      }
      /* ===== 页面容器 ===== */
      .page-container {
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .tab-page {
        display: none;
        flex-direction: column;
        flex: 1;
        overflow: hidden;
      }
      .tab-page.active {
        display: flex;
      }
      /* ===== 列表 ===== */
      .list-wrap {
        flex: 1;
        overflow-y: auto;
        padding: 6px var(--pf-space-md);
      }
      .list-wrap::-webkit-scrollbar {
        width: 4px;
      }
      .list-wrap::-webkit-scrollbar-thumb {
        background: var(--pf-border);
        border-radius: 2px;
      }
      .list-item {
        padding: var(--pf-space-base) var(--pf-space-md);
        border-radius: var(--pf-radius-md);
        cursor: pointer;
        transition:
          background var(--pf-transition),
          box-shadow var(--pf-transition),
          transform var(--pf-transition);
        margin-bottom: var(--pf-space-xs);
        display: flex;
        align-items: flex-start;
        gap: var(--pf-space-sm);
        border: 1px solid transparent;
      }
      .list-item:hover {
        background: var(--pf-bg-tertiary);
        box-shadow: var(--pf-shadow-sm);
        transform: translateY(-1px);
      }
      .list-item:active {
        transform: translateY(0);
      }
      .list-item.select-mode {
        cursor: default;
      }
      .list-item.select-mode:hover {
        transform: none;
        box-shadow: none;
      }
      .list-item .info {
        flex: 1;
        min-width: 0;
      }
      .list-item .title-line {
        font-weight: 600;
        font-size: var(--pf-fs-base);
        color: var(--pf-text-primary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 3px;
      }
      .list-item .preview-line {
        font-size: var(--pf-fs-sm);
        color: var(--pf-text-secondary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .list-item .meta-line {
        font-size: var(--pf-fs-xs);
        color: var(--pf-text-tertiary);
        margin-top: 2px;
      }
      .list-item .del-btn {
        background: transparent;
        border: none;
        color: var(--pf-border);
        cursor: pointer;
        font-size: 14px;
        padding: 2px;
        flex-shrink: 0;
        opacity: 0;
        transition:
          opacity var(--pf-transition),
          color var(--pf-transition);
      }
      .list-item:hover .del-btn {
        opacity: 1;
      }
      .list-item .del-btn:hover {
        color: var(--pf-danger);
      }
      .list-item .checkbox {
        display: none;
        flex-shrink: 0;
        margin-top: 2px;
        accent-color: var(--pf-primary);
      }
      .list-item.select-mode .checkbox {
        display: block;
      }
      .list-item.select-mode .del-btn {
        display: none;
      }
      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: var(--pf-text-tertiary);
        font-size: var(--pf-fs-base);
      }
      .empty-state .icon {
        font-size: 32px;
        margin-bottom: var(--pf-space-sm);
      }
      /* ===== 底部栏 ===== */
      .footer-bar {
        padding: var(--pf-space-sm) var(--pf-space-md);
        border-top: 1px solid var(--pf-border-light);
        color: var(--pf-text-tertiary);
        font-size: var(--pf-fs-xs);
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .footer-bar .add-btn {
        background: var(--pf-primary);
        color: #fff;
        border: none;
        padding: 4px 10px;
        border-radius: var(--pf-radius-base);
        cursor: pointer;
        font-size: var(--pf-fs-sm);
        font-weight: 600;
        transition:
          opacity var(--pf-transition),
          transform var(--pf-transition);
      }
      .footer-bar .add-btn:hover {
        opacity: 0.9;
      }
      .footer-bar .add-btn:active {
        transform: scale(0.96);
      }
      /* ===== 批量操作栏 ===== */
      .batch-bar {
        display: none;
        align-items: center;
        gap: 10px;
        padding: var(--pf-space-sm) var(--pf-space-md);
        border-top: 1px solid var(--pf-border-light);
        flex-shrink: 0;
        background: var(--pf-bg-secondary);
        animation: pf-slide-up 0.15s ease;
      }
      .batch-bar.show {
        display: flex;
      }
      .batch-bar label {
        font-size: var(--pf-fs-sm);
        color: var(--pf-text-secondary);
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .batch-bar label input {
        accent-color: var(--pf-primary);
      }
      .batch-bar .del-selected-btn {
        background: var(--pf-danger);
        color: #fff;
        border: none;
        padding: 6px 12px;
        border-radius: var(--pf-radius-base);
        cursor: pointer;
        font-size: var(--pf-fs-sm);
        font-weight: 600;
        margin-left: auto;
        transition:
          opacity var(--pf-transition),
          transform var(--pf-transition);
      }
      .batch-bar .del-selected-btn:disabled {
        opacity: 0.4;
        cursor: default;
      }
      .batch-bar .del-selected-btn:not(:disabled):active {
        transform: scale(0.96);
      }
      /* ===== 确认弹窗 ===== */
      .confirm-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        animation: pf-fade-in 0.15s ease;
      }
      .confirm-box {
        background: var(--pf-bg);
        padding: var(--pf-space-xl);
        border-radius: var(--pf-radius-lg);
        width: 280px;
        box-shadow: var(--pf-shadow-lg);
        animation: pf-scale-in 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .confirm-box p {
        font-size: var(--pf-fs-md);
        color: var(--pf-text-primary);
        margin-bottom: var(--pf-space-lg);
      }
      .confirm-box .btns {
        display: flex;
        gap: var(--pf-space-sm);
        justify-content: flex-end;
      }
      .confirm-box button {
        padding: 7px 16px;
        border-radius: var(--pf-radius-base);
        border: none;
        cursor: pointer;
        font-size: var(--pf-fs-base);
        transition:
          background var(--pf-transition),
          transform var(--pf-transition);
      }
      .confirm-box .btn-confirm {
        background: var(--pf-danger);
        color: #fff;
      }
      .confirm-box .btn-confirm:active {
        transform: scale(0.96);
      }
      .confirm-box .btn-cancel {
        background: var(--pf-bg-tertiary);
        color: var(--pf-text-secondary);
      }
      .confirm-box .btn-cancel:hover {
        background: #e5e5ee;
      }
      .confirm-box .btn-cancel:active {
        transform: scale(0.96);
      }
      /* ===== 编辑面板 ===== */
      .edit-panel {
        display: none;
        flex-direction: column;
        position: fixed;
        inset: 0;
        background: var(--pf-bg);
        z-index: 200;
        animation: pf-slide-right 0.2s ease;
      }
      .edit-panel.show {
        display: flex;
      }
      .edit-panel .ep-header {
        padding: 10px var(--pf-space-md);
        border-bottom: 1px solid var(--pf-border-light);
        display: flex;
        align-items: center;
        gap: var(--pf-space-sm);
        flex-shrink: 0;
      }
      .edit-panel .ep-header .ep-back {
        background: transparent;
        border: none;
        color: var(--pf-primary);
        font-size: 16px;
        cursor: pointer;
        padding: 4px;
      }
      .edit-panel .ep-header .ep-title {
        font-weight: 600;
        font-size: var(--pf-fs-md);
        color: var(--pf-text-primary);
        flex: 1;
      }
      .edit-panel .ep-header .ep-save {
        background: var(--pf-primary);
        color: #fff;
        border: none;
        padding: 6px 12px;
        border-radius: var(--pf-radius-base);
        cursor: pointer;
        font-size: var(--pf-fs-base);
        transition:
          opacity var(--pf-transition),
          transform var(--pf-transition);
      }
      .edit-panel .ep-header .ep-save:active {
        transform: scale(0.96);
      }
      .edit-panel .ep-header .ep-delete {
        background: transparent;
        border: none;
        color: var(--pf-danger);
        font-size: 18px;
        cursor: pointer;
        padding: 2px 6px;
      }
      .edit-panel .ep-body {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: var(--pf-space-md);
        overflow-y: auto;
        gap: 10px;
      }
      .edit-panel .ep-body input,
      .edit-panel .ep-body textarea {
        width: 100%;
        border: 1px solid var(--pf-border);
        border-radius: var(--pf-radius-base);
        padding: 10px;
        font-size: var(--pf-fs-base);
        font-family: inherit;
        color: var(--pf-text-primary);
        background: var(--pf-bg-secondary);
        outline: none;
        resize: vertical;
        transition:
          border-color var(--pf-transition),
          box-shadow var(--pf-transition),
          background var(--pf-transition);
      }
      .edit-panel .ep-body input:focus,
      .edit-panel .ep-body textarea:focus {
        border-color: var(--pf-primary);
        box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        background: var(--pf-bg);
      }
      .edit-panel .ep-body textarea {
        flex: 1;
        min-height: 200px;
      }
      /* ===== 动画 ===== */
      @keyframes pf-fade-in {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes pf-scale-in {
        from {
          opacity: 0;
          transform: scale(0.92);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes pf-slide-up {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes pf-slide-right {
        from {
          opacity: 0;
          transform: translateX(20px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      /* ===== Toast ===== */
      #toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #1f2937;
        color: #fff;
        padding: 8px 18px;
        border-radius: var(--pf-radius-base);
        font-size: var(--pf-fs-base);
        opacity: 0;
        transition: opacity 0.3s;
        z-index: 300;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <span class="logo">📋 PromptFlow</span>
      <span class="badge">v2.0</span>
    </div>

    <div class="tabs">
      <div class="tab-item active" data-tab="prompts">📋 列表</div>
      <div class="tab-item" data-tab="templates">📝 模板</div>
      <div class="tab-item" data-tab="tests">🧪 测试</div>
      <div class="tab-item" data-tab="settings">⚙️ 设置</div>
    </div>

    <div class="page-container">
      <div class="tab-page active" id="prompts">
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="搜索 Prompt..." />
          <button class="btn-sm" id="multiSelectBtn">多选</button>
          <button class="btn-sm" id="exitSelectBtn" style="display: none">退出</button>
        </div>
        <div class="list-wrap">
          <div id="promptList">
            <div class="empty-state">
              <div class="icon">📋</div>
              <div>还没有保存 Prompt</div>
            </div>
          </div>
        </div>
        <div class="batch-bar" id="batchBar">
          <label><input type="checkbox" id="selectAllCb" /> <span>全选</span></label>
          <span id="batchLabel" style="font-size: var(--pf-fs-sm); color: var(--pf-text-secondary)"
            >请选择要删除的 Prompt</span
          >
          <button class="del-selected-btn" id="batchDelBtn" disabled>🗑 删除选中</button>
        </div>
        <div class="footer-bar">
          <span id="promptCount">0 条</span>
          <button class="add-btn" id="promptAddBtn">+ 新建</button>
        </div>
      </div>

      <div class="tab-page" id="templates">
        <div class="search-bar">
          <input type="text" id="tmplSearchInput" placeholder="搜索模板..." />
          <button class="btn-sm" id="tmplMultiSelectBtn">多选</button>
          <button class="btn-sm" id="tmplExitSelectBtn" style="display: none">退出</button>
        </div>
        <div class="list-wrap">
          <div id="tmplList">
            <div class="empty-state">
              <div class="icon">📝</div>
              <div>还没有模板</div>
            </div>
          </div>
        </div>
        <div class="batch-bar" id="tmplBatchBar">
          <label><input type="checkbox" id="tmplSelectAllCb" /> <span>全选</span></label>
          <span
            id="tmplBatchLabel"
            style="font-size: var(--pf-fs-sm); color: var(--pf-text-secondary)"
            >请选择要删除的模板</span
          >
          <button class="del-selected-btn" id="tmplBatchDelBtn" disabled>🗑 删除选中</button>
        </div>
        <div class="footer-bar">
          <span id="tmplCount">0 条</span>
          <button class="add-btn" id="tmplAddBtn">+ 新建</button>
        </div>
      </div>

      <div class="tab-page" id="tests">
        <div class="empty-state">
          <div class="icon">🧪</div>
          <div>A/B 测试功能开发中...</div>
        </div>
      </div>

      <div class="tab-page" id="settings">
        <div class="empty-state">
          <div class="icon">⚙️</div>
          <div>设置功能开发中...</div>
        </div>
      </div>
    </div>

    <div class="edit-panel" id="editPanel">
      <div class="ep-header">
        <button class="ep-back" id="epBack">←</button>
        <span class="ep-title">编辑 Prompt</span>
        <button class="ep-delete" id="epDelete" title="删除">🗑</button>
        <button class="ep-save" id="epSave">💾 保存</button>
      </div>
      <div class="ep-body">
        <input type="text" id="epTitle" placeholder="标题（可选）" />
        <textarea id="epText" placeholder="Prompt 内容"></textarea>
        <input type="text" id="epNotes" placeholder="备注（可选）" />
      </div>
    </div>

    <div class="edit-panel" id="tmplEditPanel">
      <div class="ep-header">
        <button class="ep-back" id="tmplEpBack">←</button>
        <span class="ep-title">编辑模板</span>
        <button class="ep-delete" id="tmplEpDelete" title="删除">🗑</button>
        <button class="ep-save" id="tmplEpSave">💾 保存</button>
      </div>
      <div class="ep-body">
        <input type="text" id="tmplEditTitle" placeholder="模板名称（可选）" />
        <textarea id="tmplEditText" placeholder="模板内容，使用 {{变量名}} 表示变量"></textarea>
        <input type="text" id="tmplEditNotes" placeholder="备注（可选）" />
      </div>
    </div>

    <div id="confirmContainer"></div>

    <div id="toast"></div>

    <script src="popup.js"></script>
  </body>
</html>
