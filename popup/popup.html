<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 420px;
            height: 540px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 14px;
            color: #1f2937;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== 顶部 ===== */
        .header {
            padding: 10px 14px;
            border-bottom: 1px solid #e5e7eb;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h2 {
            font-size: 17px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-right {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .header-right button {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 5px;
            border: 1px solid #e5e7eb;
            background: #fff;
            cursor: pointer;
        }

        .header-right .btn-batch {
            color: #ef4444;
            border-color: #ef4444;
            display: none;
        }

        .header-right .btn-batch.show {
            display: inline-block;
        }

        .header-right .btn-batch:hover {
            background: #ef4444;
            color: #fff;
        }

        .header-right .btn-select {
            font-size: 11px;
            color: #667eea;
            border-color: #667eea;
        }

        .header-right .btn-select:hover {
            background: #667eea;
            color: #fff;
        }

        .header-right .btn-cancel {
            display: none;
        }

        .header-right .btn-cancel.show {
            display: inline-block;
        }

        .search-bar {
            padding: 6px 14px;
            flex-shrink: 0;
        }

        .search-bar input {
            width: 100%;
            padding: 7px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
        }

        .search-bar input:focus {
            border-color: #667eea;
        }

        /* ===== 内容区 ===== */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 0 14px 6px;
        }

        .tab-page {
            display: none;
        }

        .tab-page.active {
            display: block;
        }

        /* ===== 底部 Tab ===== */
        .tab-bar {
            display: flex;
            border-top: 1px solid #e5e7eb;
            flex-shrink: 0;
        }

        .tab-item {
            flex: 1;
            text-align: center;
            padding: 10px 0 8px;
            cursor: pointer;
            font-size: 11px;
            color: #9ca3af;
            transition: color 0.15s;
            user-select: none;
        }

        .tab-item .icon {
            font-size: 17px;
            display: block;
            margin-bottom: 1px;
        }

        .tab-item.active {
            color: #667eea;
            font-weight: 600;
        }

        /* ===== 列表项 — 紧凑两行 ===== */
        .list-item {
            display: flex;
            align-items: flex-start;
            padding: 8px 10px;
            border-radius: 8px;
            margin-bottom: 4px;
            gap: 8px;
            cursor: pointer;
            transition: background 0.1s;
            border: 1px solid transparent;
        }

        .list-item:hover {
            background: #f9fafb;
        }

        .list-item.selected {
            background: #eef2ff;
            border-color: #667eea;
        }

        .list-item .checkbox {
            flex-shrink: 0;
            width: 16px;
            height: 16px;
            margin-top: 3px;
            display: none;
        }

        .list-item.select-mode .checkbox {
            display: block;
        }

        .list-item .info {
            flex: 1;
            min-width: 0;
        }

        .list-item .info .title-line {
            font-weight: 600;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }

        .list-item .info .preview-line {
            font-size: 12px;
            color: #6b7280;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 1px;
        }

        .list-item .info .meta-line {
            font-size: 10px;
            color: #b0b7c3;
        }

        /* ===== 编辑面板（滑入） ===== */
        .edit-panel {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 52px;
            background: #fff;
            z-index: 10;
            display: none;
            flex-direction: column;
        }

        .edit-panel.show {
            display: flex;
        }

        .edit-panel .ep-header {
            padding: 10px 14px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .ep-header .ep-back {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 2px 4px;
        }

        .ep-header .ep-title {
            font-weight: 600;
            font-size: 15px;
        }

        .edit-panel .ep-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .ep-body label {
            font-size: 12px;
            color: #6b7280;
            font-weight: 600;
            margin-bottom: -6px;
        }

        .ep-body input,
        .ep-body textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
        }

        .ep-body input:focus,
        .ep-body textarea:focus {
            border-color: #667eea;
        }

        .ep-body textarea {
            min-height: 200px;
            line-height: 1.65;
            resize: vertical;
        }

        .ep-body .ep-save {
            background: #667eea;
            color: #fff;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
        }

        .ep-body .ep-delete {
            background: #fff;
            color: #ef4444;
            border: 1px solid #ef4444;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }

        .empty-state .icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        #toast {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .confirm-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        .confirm-box {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            width: 280px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        }

        .confirm-box p {
            margin-bottom: 16px;
            font-size: 14px;
        }

        .confirm-box .btns {
            display: flex;
            gap: 8px;
        }

        .confirm-box .btns button {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            font-size: 13px;
            cursor: pointer;
        }

        .confirm-box .btn-confirm {
            background: #ef4444;
            color: #fff;
            border: none;
        }
    </style>
</head>

<body>

    <!-- ===== 顶部标题栏 ===== -->
    <div class="header">
        <h2>PromptFlow</h2>
        <div class="header-right">
            <span style="font-size:11px;color:#9ca3af;" id="promptCount">0 条</span>
            <button class="btn-select" id="btnSelect">选择</button>
            <button class="btn-cancel" id="btnCancel">取消</button>
            <button class="btn-batch" id="btnBatchDel">删除选中</button>
        </div>
    </div>

    <!-- ===== 搜索框 ===== -->
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 搜索 Prompt..." />
    </div>

    <!-- ===== 列表 + Tab 页 ===== -->
    <div class="content" id="mainContent">
        <div class="tab-page active" id="tab-list">
            <div id="promptList"></div>
        </div>
        <div class="tab-page" id="tab-template">
            <div class="empty-state">
                <div class="icon">📝</div>
                <div>模板功能开发中...</div>
            </div>
        </div>
        <div class="tab-page" id="tab-test">
            <div class="empty-state">
                <div class="icon">🧪</div>
                <div>A/B 测试功能开发中...</div>
            </div>
        </div>
        <div class="tab-page" id="tab-settings">
            <div class="empty-state">
                <div class="icon">⚙️</div>
                <div>设置功能开发中...</div>
            </div>
        </div>
    </div>

    <!-- ===== 编辑面板（滑入） ===== -->
    <div class="edit-panel" id="editPanel">
        <div class="ep-header">
            <button class="ep-back" id="epBack">←</button>
            <span class="ep-title">编辑 Prompt</span>
        </div>
        <div class="ep-body">
            <label>标题</label>
            <input type="text" id="epTitle" placeholder="输入标题..." />
            <label>内容</label>
            <textarea id="epText" placeholder="Prompt 正文"></textarea>
            <label>备注</label>
            <input type="text" id="epNotes" placeholder="备注（可选）" />
            <button class="ep-save" id="epSave">💾 保存</button>
            <button class="ep-delete" id="epDelete">🗑 删除此 Prompt</button>
        </div>
    </div>

    <!-- ===== 底部 Tab ===== -->
    <div class="tab-bar">
        <div class="tab-item active" data-tab="tab-list"><span class="icon">📋</span>列表</div>
        <div class="tab-item" data-tab="tab-template"><span class="icon">📝</span>模板</div>
        <div class="tab-item" data-tab="tab-test"><span class="icon">🧪</span>测试</div>
        <div class="tab-item" data-tab="tab-settings"><span class="icon">⚙️</span>设置</div>
    </div>

    <!-- ===== Toast + 确认弹窗 ===== -->
    <div id="toast"></div>
    <div id="confirmContainer"></div>

    <script src="popup.js"></script>
</body>

</html>
