<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PromptFlow</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 360px;
        height: 460px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        color: #333;
        background: #fff;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      /* ===== 头部 ===== */
      .header {
        padding: 12px 14px 0;
        display: flex;
        align-items: center;
        gap: 8px;
        border-bottom: 1px solid #f0f0f2;
        flex-shrink: 0;
      }
      .header .logo {
        font-size: 16px;
        font-weight: 700;
        color: #7c3aed;
      }
      .header .badge {
        font-size: 10px;
        background: #7c3aed;
        color: #fff;
        padding: 2px 6px;
        border-radius: 4px;
      }
      /* ===== Tab 栏 + 搜索 ===== */
      .tabs {
        display: flex;
        gap: 0;
        padding: 0 14px;
        flex-shrink: 0;
        border-bottom: 1px solid #f0f0f2;
      }
      .tab-item {
        padding: 10px 14px;
        cursor: pointer;
        color: #888;
        font-size: 13px;
        border-bottom: 2px solid transparent;
        transition: all 0.15s;
        user-select: none;
      }
      .tab-item:hover {
        color: #555;
      }
      .tab-item.active {
        color: #7c3aed;
        border-bottom-color: #7c3aed;
        font-weight: 600;
      }
      .search-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        flex-shrink: 0;
      }
      .search-bar input {
        flex: 1;
        padding: 7px 10px;
        border: 1px solid #e0e0e5;
        border-radius: 8px;
        background: #f5f5f8;
        color: #333;
        font-size: 13px;
        outline: none;
      }
      .search-bar input:focus {
        border-color: #7c3aed;
      }
      .search-bar .btn-sm {
        padding: 6px 10px;
        border: none;
        border-radius: 6px;
        background: #f0f0f2;
        color: #555;
        cursor: pointer;
        font-size: 12px;
        white-space: nowrap;
      }
      .search-bar .btn-sm:hover {
        background: #e0e0e5;
      }
      /* ===== 页面容器 ===== */
      .page-container {
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .tab-page {
        display: none;
        flex-direction: column;
        flex: 1;
        overflow: hidden;
      }
      .tab-page.active {
        display: flex;
      }
      /* ===== 列表 ===== */
      .list-wrap {
        flex: 1;
        overflow-y: auto;
        padding: 6px 14px;
      }
      .list-wrap::-webkit-scrollbar {
        width: 4px;
      }
      .list-wrap::-webkit-scrollbar-thumb {
        background: #d0d0d5;
        border-radius: 2px;
      }
      .list-item {
        padding: 10px 12px;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.1s;
        margin-bottom: 2px;
        display: flex;
        align-items: flex-start;
        gap: 8px;
      }
      .list-item:hover {
        background: #f5f5f8;
      }
      .list-item.select-mode {
        cursor: default;
      }
      .list-item .info {
        flex: 1;
        min-width: 0;
      }
      .list-item .title-line {
        font-weight: 600;
        font-size: 13px;
        color: #333;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 3px;
      }
      .list-item .preview-line {
        font-size: 11px;
        color: #888;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .list-item .meta-line {
        font-size: 10px;
        color: #aaa;
        margin-top: 2px;
      }
      .list-item .del-btn {
        background: transparent;
        border: none;
        color: #ccc;
        cursor: pointer;
        font-size: 14px;
        padding: 2px;
        flex-shrink: 0;
        opacity: 0;
        transition:
          opacity 0.15s,
          color 0.15s;
      }
      .list-item:hover .del-btn {
        opacity: 1;
      }
      .list-item .del-btn:hover {
        color: #e53e3e;
      }
      .list-item .checkbox {
        display: none;
        flex-shrink: 0;
        margin-top: 2px;
        accent-color: #7c3aed;
      }
      .list-item.select-mode .checkbox {
        display: block;
      }
      .list-item.select-mode .del-btn {
        display: none;
      }
      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: #999;
        font-size: 13px;
      }
      .empty-state .icon {
        font-size: 32px;
        margin-bottom: 8px;
      }
      /* ===== 底部计数 ===== */
      .footer-bar {
        padding: 8px 14px;
        border-top: 1px solid #f0f0f2;
        color: #999;
        font-size: 11px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .footer-bar .add-btn {
        background: #7c3aed;
        color: #fff;
        border: none;
        padding: 4px 10px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
      }
      .footer-bar .add-btn:hover {
        opacity: 0.85;
      }
      /* ===== 批量操作栏 ===== */
      .batch-bar {
        display: none;
        align-items: center;
        gap: 10px;
        padding: 8px 14px;
        border-top: 1px solid #f0f0f2;
        flex-shrink: 0;
        background: #fafafb;
      }
      .batch-bar.show {
        display: flex;
      }
      .batch-bar label {
        font-size: 12px;
        color: #666;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .batch-bar label input {
        accent-color: #7c3aed;
      }
      .batch-bar .del-selected-btn {
        background: #e53e3e;
        color: #fff;
        border: none;
        padding: 6px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
        margin-left: auto;
      }
      .batch-bar .del-selected-btn:disabled {
        opacity: 0.4;
        cursor: default;
      }
      .batch-bar .cancel-btn {
        background: transparent;
        border: 1px solid #d0d0d5;
        color: #666;
        padding: 5px 10px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
      }
      /* ===== 确认弹窗 ===== */
      .confirm-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }
      .confirm-box {
        background: #fff;
        padding: 20px;
        border-radius: 12px;
        width: 280px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
      }
      .confirm-box p {
        font-size: 14px;
        color: #333;
        margin-bottom: 16px;
      }
      .confirm-box .btns {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }
      .confirm-box button {
        padding: 7px 16px;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        font-size: 13px;
      }
      .confirm-box .btn-confirm {
        background: #e53e3e;
        color: #fff;
      }
      .confirm-box .btn-cancel {
        background: #f0f0f2;
        color: #555;
      }
      /* ===== 编辑面板 ===== */
      .edit-panel {
        display: none;
        flex-direction: column;
        position: fixed;
        inset: 0;
        background: #fff;
        z-index: 200;
      }
      .edit-panel.show {
        display: flex;
      }
      .edit-panel .ep-header {
        padding: 10px 14px;
        border-bottom: 1px solid #f0f0f2;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }
      .edit-panel .ep-header .ep-back {
        background: transparent;
        border: none;
        color: #7c3aed;
        font-size: 16px;
        cursor: pointer;
        padding: 4px;
      }
      .edit-panel .ep-header .ep-title {
        font-weight: 600;
        font-size: 14px;
        flex: 1;
      }
      .edit-panel .ep-header .ep-save {
        background: #7c3aed;
        color: #fff;
        border: none;
        padding: 6px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
      }
      .edit-panel .ep-header .ep-delete {
        background: transparent;
        border: none;
        color: #e53e3e;
        font-size: 18px;
        cursor: pointer;
        padding: 2px 6px;
      }
      .edit-panel .ep-body {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 14px;
        overflow-y: auto;
        gap: 10px;
      }
      .edit-panel .ep-body input,
      .edit-panel .ep-body textarea {
        width: 100%;
        border: 1px solid #e0e0e5;
        border-radius: 8px;
        padding: 10px;
        font-size: 13px;
        font-family: inherit;
        color: #333;
        background: #fafafb;
        outline: none;
        resize: vertical;
      }
      .edit-panel .ep-body input:focus,
      .edit-panel .ep-body textarea:focus {
        border-color: #7c3aed;
      }
      .edit-panel .ep-body textarea {
        flex: 1;
        min-height: 200px;
      }
      /* ===== Toast ===== */
      #toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #1f2937;
        color: #fff;
        padding: 8px 18px;
        border-radius: 8px;
        font-size: 13px;
        opacity: 0;
        transition: opacity 0.3s;
        z-index: 300;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <!-- 头部 -->
    <div class="header">
      <span class="logo">📋 PromptFlow</span>
      <span class="badge">v2.0</span>
    </div>

    <!-- Tab 栏 -->
    <div class="tabs">
      <div class="tab-item active" data-tab="prompts">📋 列表</div>
      <div class="tab-item" data-tab="templates">📝 模板</div>
      <div class="tab-item" data-tab="tests">🧪 测试</div>
      <div class="tab-item" data-tab="settings">⚙️ 设置</div>
    </div>

    <div class="page-container">
      <!-- ===== Prompt 列表页 ===== -->
      <div class="tab-page active" id="prompts">
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="搜索 Prompt..." />
          <button class="btn-sm" id="multiSelectBtn">多选</button>
          <button class="btn-sm" id="exitSelectBtn" style="display: none">退出</button>
        </div>
        <div class="list-wrap" id="promptListContainer">
          <div id="promptList">
            <div class="empty-state">
              <div class="icon">📋</div>
              <div>还没有保存 Prompt</div>
            </div>
          </div>
        </div>
        <div class="batch-bar" id="batchBar">
          <label><input type="checkbox" id="selectAllCb" /> <span>全选</span></label>
          <span id="batchLabel" style="font-size: 12px; color: #666">请选择要删除的 Prompt</span>
          <button class="del-selected-btn" id="batchDelBtn" disabled>🗑 删除选中</button>
        </div>
        <div class="footer-bar">
          <span id="promptCount">0 条</span>
        </div>
      </div>

      <!-- ===== 模板页 ===== -->
      <div class="tab-page" id="templates">
        <div class="search-bar">
          <input type="text" id="tmplSearchInput" placeholder="搜索模板..." />
        </div>
        <div class="list-wrap">
          <div id="tmplList">
            <div class="empty-state">
              <div class="icon">📝</div>
              <div>还没有模板</div>
            </div>
          </div>
        </div>
        <div class="footer-bar">
          <span id="tmplCount">0 条</span>
          <button class="add-btn" id="tmplAddBtn">+ 新建</button>
        </div>
      </div>

      <!-- ===== 测试页 ===== -->
      <div class="tab-page" id="tests">
        <div class="empty-state">
          <div class="icon">🧪</div>
          <div>A/B 测试功能开发中...</div>
        </div>
      </div>

      <!-- ===== 设置页 ===== -->
      <div class="tab-page" id="settings">
        <div class="empty-state">
          <div class="icon">⚙️</div>
          <div>设置功能开发中...</div>
        </div>
      </div>
    </div>

    <!-- ===== Prompt 编辑面板 ===== -->
    <div class="edit-panel" id="editPanel">
      <div class="ep-header">
        <button class="ep-back" id="epBack">←</button>
        <span class="ep-title">编辑 Prompt</span>
        <button class="ep-delete" id="epDelete" title="删除">🗑</button>
        <button class="ep-save" id="epSave">💾 保存</button>
      </div>
      <div class="ep-body">
        <input type="text" id="epTitle" placeholder="标题（可选）" />
        <textarea id="epText" placeholder="Prompt 内容"></textarea>
        <input type="text" id="epNotes" placeholder="备注（可选）" />
      </div>
    </div>

    <!-- ===== 模板编辑面板 ===== -->
    <div class="edit-panel" id="tmplEditPanel">
      <div class="ep-header">
        <button class="ep-back" id="tmplEpBack">←</button>
        <span class="ep-title">编辑模板</span>
        <button class="ep-delete" id="tmplEpDelete" title="删除">🗑</button>
        <button class="ep-save" id="tmplEpSave">💾 保存</button>
      </div>
      <div class="ep-body">
        <input type="text" id="tmplEditTitle" placeholder="模板名称（可选）" />
        <textarea id="tmplEditText" placeholder="模板内容，使用 {{变量名}} 表示变量"></textarea>
        <input type="text" id="tmplEditNotes" placeholder="备注（可选）" />
      </div>
    </div>

    <!-- 确认弹窗容器 -->
    <div id="confirmContainer"></div>

    <!-- Toast -->
    <div id="toast"></div>

    <script src="popup.js"></script>
  </body>
</html>
